<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Grand Prix — Editor</title>
        <link rel="icon" type="image/png" href="../formula-one-transparent.png" />
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }
            #menubar {
                display: flex;
                background: #2d2d2d;
                color: #cccccc;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                    Roboto, sans-serif;
                font-size: 13px;
                user-select: none;
                flex-shrink: 0;
            }
            #menubar .menu-item {
                position: relative;
                padding: 4px 10px;
                cursor: pointer;
            }
            #menubar .menu-item:hover {
                background: #3e3e3e;
            }
            #menubar .menu-item.open {
                background: #3e3e3e;
            }
            #menubar .menu-dropdown {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                background: #2d2d2d;
                border: 1px solid #454545;
                min-width: 220px;
                z-index: 200;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            }
            #menubar .menu-item.open .menu-dropdown {
                display: block;
            }
            #menubar .menu-dropdown .dropdown-item {
                padding: 6px 24px 6px 12px;
                display: flex;
                justify-content: space-between;
                cursor: pointer;
                white-space: nowrap;
            }
            #menubar .menu-dropdown .dropdown-item:hover {
                background: #094771;
            }
            #menubar .menu-dropdown .dropdown-item .shortcut {
                color: #888888;
                margin-left: 24px;
                font-size: 12px;
            }
            #menubar .menu-dropdown .separator {
                height: 1px;
                background: #454545;
                margin: 4px 0;
            }
            #connect-banner {
                display: none;
                background: #094771;
                color: #ffffff;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                    Roboto, sans-serif;
                font-size: 13px;
                padding: 6px 12px;
                align-items: center;
                gap: 12px;
                flex-shrink: 0;
            }
            #connect-banner.visible {
                display: flex;
            }
            #connect-banner .banner-message {
                flex: 1;
            }
            #connect-banner button {
                background: #2d2d2d;
                color: #ffffff;
                border: 1px solid #ffffff44;
                padding: 4px 12px;
                font-size: 12px;
                font-family: inherit;
                cursor: pointer;
            }
            #connect-banner button:hover {
                background: #3e3e3e;
            }
            #connect-banner .banner-dismiss {
                background: transparent;
                border: none;
                color: #ffffff;
                padding: 4px 8px;
                font-size: 16px;
                line-height: 1;
            }
            #editor {
                width: 100%;
                flex: 1;
                min-height: 0;
            }
            .edit-margin-changed {
                background: #587c0c;
                width: 3px !important;
                margin-left: 3px;
            }
            .edit-margin-saved {
                background: #1b81a8;
                width: 3px !important;
                margin-left: 3px;
            }
        </style>
    </head>
    <body>
        <div id="menubar"></div>
        <div id="connect-banner"></div>
        <div id="editor"></div>

        <script
            async
            defer
            src="https://accounts.google.com/gsi/client"
            onload="window.handleClientLoad?.()"
        ></script>
        <script
            async
            defer
            src="https://apis.google.com/js/api.js"
            onload="window.handleClientLoad?.()"
        ></script>

        <script type="module" src="/src/index.js"></script>
    </body>
</html>
