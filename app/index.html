<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Drive Monaco — Editor</title>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
            }
            #editor {
                width: 100%;
                height: 100%;
            }
            .edit-margin-changed {
                background: #587c0c;
                width: 3px !important;
                margin-left: 3px;
            }
            .edit-margin-saved {
                background: #1b81a8;
                width: 3px !important;
                margin-left: 3px;
            }
        </style>
    </head>
    <body>
        <div id="editor"></div>

        <script
            async
            defer
            src="https://accounts.google.com/gsi/client"
            onload="window.handleClientLoad?.()"
        ></script>
        <script
            async
            defer
            src="https://apis.google.com/js/api.js"
            onload="window.handleClientLoad?.()"
        ></script>

        <script type="module" src="/src/index.js"></script>
    </body>
</html>
