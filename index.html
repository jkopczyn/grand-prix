<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Grand Prix</title>
        <link rel="icon" type="image/png" href="formula-one-transparent.png" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                    Roboto, sans-serif;
                background: #1e1e1e;
                color: #cccccc;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
            }
            .container {
                text-align: center;
                max-width: 600px;
                padding: 40px;
            }
            .logo {
                width: 256px;
                height: 256px;
                margin-bottom: 24px;
            }
            h1 {
                color: #ffffff;
                font-size: 2.5rem;
                margin-bottom: 16px;
            }
            p {
                font-size: 1.1rem;
                line-height: 1.6;
                margin-bottom: 32px;
            }
            .button-row {
                display: flex;
                gap: 12px;
                justify-content: center;
            }
            .btn {
                display: inline-block;
                padding: 14px 32px;
                font-size: 1rem;
                color: #ffffff;
                text-decoration: none;
                border-radius: 6px;
            }
            .btn-primary {
                background: #4285f4;
            }
            .btn-primary:hover {
                background: #3367d6;
            }
            .btn-secondary {
                background: #3a3a3a;
            }
            .btn-secondary:hover {
                background: #4a4a4a;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <img src="formula-one-transparent.png" alt="" class="logo" />
            <h1>Grand Prix</h1>
            <p>
                Monaco Drive - A full-featured code and plaintext editor,
                Monaco-powered on Google Drive for seamless file editing.
            </p>
            <div class="button-row">
                <a href="app/" class="btn btn-primary">Open Editor</a>
                <a
                    href="app/?state=%7B%22action%22%3A%22create%22%7D"
                    class="btn btn-secondary"
                    >New File</a
                >
            </div>
        </div>
    </body>
</html>
